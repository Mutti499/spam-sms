const container = document.getElementById('cards');
const decisions = {};

items.forEach((item, i) => {
    const changeDir = item.original + ' <span class="arrow">-&gt;</span> ' + item.bert;
    container.innerHTML += `
    <div class="card" id="card-${i}">
        <div class="card-header">
            <strong>#${i+1} (Index ${item.index})</strong>
            <div class="badges">
                <span class="badge badge-${item.original}">Was: ${item.original.toUpperCase()}</span>
                <span class="badge badge-changed">BERT: ${item.bert.toUpperCase()} (${item.conf}%)</span>
            </div>
        </div>
        <div class="message-text">${escapeHtml(item.text)}</div>
        <div class="buttons">
            <button class="btn btn-ham" onclick="pick(${i}, 'ham')">HAM</button>
            <button class="btn btn-spam" onclick="pick(${i}, 'spam')">SPAM</button>
        </div>
    </div>`;
});

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function pick(i, label) {
    decisions[i] = { index: items[i].index, label: label };
    const card = document.getElementById('card-' + i);
    card.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
    card.querySelector(label === 'ham' ? '.btn-ham' : '.btn-spam').classList.add('selected');
    card.classList.add('done');

    const count = Object.keys(decisions).length;
    document.getElementById('progress').textContent = count + ' / 22 reviewed';

    if (count === 22) {
        document.getElementById('submit-btn').style.display = 'block';
    }
}

function submit() {
    const result = Object.values(decisions);
    const json = JSON.stringify(result);
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').innerHTML = `
        <h2>Done! Copy this and paste it to Claude Code:</h2>
        <div class="result-box">
            <code>${json}</code>
        </div>`;
}
